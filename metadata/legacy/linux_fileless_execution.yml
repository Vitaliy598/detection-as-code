# Historical metadata snapshot for the legacy DET-LINUX-001 implementation.
# This file is retained for comparison only. It is not a canonical manifest and
# is excluded from metadata/DET-*.json validation. The canonical source of truth
# is metadata/DET-LINUX-001.json.
legacy: true
canonical_manifest: metadata/DET-LINUX-001.json
historical_id: DET-LINUX-001
title: Linux Suspicious Fileless Execution
status: historical
severity: high
confidence: medium

description: >
  Historical metadata for suspicious Linux command patterns where remote or
  encoded content may be executed through shell interpreters.

data_sources:
  - Linux process execution logs
  - Command line telemetry
  - Network/download telemetry

required_fields:
  - Time
  - Host
  - User
  - SourceIP
  - Command

detection_logic:
  - Detect curl or wget delivery
  - Detect pipe-to-shell execution patterns
  - Detect encoded execution patterns
  - Correlate multiple signals within the configured time window

mitre_attack:
  - tactic: Execution
    technique: Command and Scripting Interpreter
  - tactic: Defense Evasion
    technique: Obfuscated Files or Information

false_positives:
  - Approved automation scripts
  - Developer setup scripts
  - Internal maintenance activity

testing:
  regression_cases:
    - FILELESS
    - ENCODED_FILELESS
    - COMMAND_SUBSTITUTION
    - BENIGN_REMOTE_SCRIPT
