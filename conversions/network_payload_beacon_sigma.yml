title: Script Interpreter Download Or Repeated Outbound Connection Signal
id: 9f0a7d2e-9c4a-4f41-9d7a-network-payload-beacon
status: test
description: Atomic normalized behaviors for DET-NET-001; sequence and threshold correlation require SIEM-native logic.
author: Vitaliy
date: 2026-06-24
modified: 2026-07-12
logsource:
  category: proxy
  product: network
detection:
  selection_download:
    event.action: download
    event.outcome: success
    process.name:
      - powershell.exe
      - pwsh.exe
  selection_outbound:
    event.action: outbound_connect
    event.outcome: success
  condition: selection_download or selection_outbound
fields:
  - host.name
  - user.name
  - process.name
  - url.domain
  - destination.ip
falsepositives:
  - Authorized script-based software retrieval
  - Monitoring agents with frequent outbound status checks
level: medium
tags:
  - attack.command_and_control
  - attack.t1105
  - attack.t1071.001
